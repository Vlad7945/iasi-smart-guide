<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palace of Culture - Virtual Guide - Iași</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script type="module">
    console.log("MODULE INLINE WORKS");
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=TASA+Orbiter:wght@400..800&display=swap" rel="stylesheet">

</head>
<body>
    <main class="app-container gradient-background" data-sidebar-state = "closed">
        <banner-element
                title="Palace of Culture"
                subtitle="Explore Iași's Cultural Landmark">
            <toggle-menu-button></toggle-menu-button>
            <reload-button></reload-button>
            <info-button></info-button>
        </banner-element>
        <sidebar-element data-state = "closed">
            <close-sidebar-button></close-sidebar-button>
            <sidebar-search></sidebar-search>
            <sidebar-filter></sidebar-filter>
        </sidebar-element>
        <chat-area>
            <chat-input></chat-input>
            <default-message></default-message>
        </chat-area>
    </main>
    <div class="background"></div>
    <!-- TOAST NOTIFICATIONS -->
    <div class="toast" id="toast"></div>
    <!--        T E M P L A T E U R I -->
    <template id="banner-template">
        <!-- LEFT SIDE -->
{#        style="display:contents; align-items:center; gap:10px;"#}
        <div class="menu-slot"></div>

        <!-- TITLE -->
        <div class="logo-section">
            <h1 class="logo-title">Palace of Culture</h1>
            <span class="logo-subtitle">Explore Iași's Cultural Landmark</span>
        </div>
        <!-- RIGHT SIDE -->
        <div class="action-btns-slot"></div>
    </template>

    <template id="toggle-menu-template">
        <button class="icon-btn" id="menuBtn" title="Toggle Menu">
                <i class="fas fa-bars"></i>
        </button>
    </template>

    <template id="info-button-template">
        <button class="icon-btn" id="infoBtn" title="Palace Information">
            <i class="fas fa-info-circle"></i>
        </button>
    </template>

    <template id="reload-button-template">
        <button class="icon-btn" id="resetBtn" title="Start New Chat">
            <i class="fas fa-sync-alt"></i>
        </button>
    </template>

    <template id="sidebar-template">
        <div class="search-filter-slot">
            <h2 class="sidebar-title">Explore Rooms</h2>
        </div>
        <div class="rooms-slot" id="roomsList"></div>
    </template>

    <template id="close-sidebar-button-template">
        <button class="icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
        </button>
    </template>

    <template id="sidebar-search-template">
        <input
                type="text"
                id="roomSearch"
                placeholder="Find a room..."
                class="search-input"
        />
{#        <i class="fas fa-search search-icon"></i>#}
    </template>

    <template id="sidebar-filter-template">
        <span class = "filter-tab-slot">
            <button class="filter-tab active" data-filter="all">All Rooms</button>
            <button class="filter-tab" data-filter="museum">Museums</button>
            <button class="filter-tab" data-filter="representative hall">Halls</button>
            <button class="filter-tab" data-filter="attraction">Attractions</button>
        </span>
    </template>

    <template id="room-item-template">
        <div class="room-item">
            <div class="room-name"></div>
            <div class="room-type"></div>
            <div class="room-floor-info"></div>
        </div>
    </template>

    <template id="chat-template">
            <div class="chat-messages" id="chatMessages">
                <div class="messages-slot"></div>
            </div>
    </template>

    <template id="chat-input-template">
        <div class="input-section">
            <form id="chatForm" >
                <div class="input-box">
                    <input
                            type="text"
                            id="messageInput"
                            placeholder="Ask me anything about the palace..."
                            autocomplete="off"
                            maxlength="500"
                            class="message-input"
                    />
                    <button type="submit" class="btn-send" id="sendButton">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </template>

    <template id="default-message-template">
        <div class="message assistant-message">
            <div class="message-content">
                <p class="message-title">Welcome to Your Private Tour</p>
                <p>I'm your personal guide to the Palace of Culture. Select a room from the sidebar to explore, or ask me anything about the palace—from Moldavian culture to architecture, food recommendations, and accessibility information.</p>
                <div class="welcome-tips">
                    <p><strong>Getting Started:</strong> Click any room in the sidebar, or type your question below.</p>
                </div>
            </div>
        </div>
    </template>

    <template id="user-message-template">
        <div class="message user-message">
            <div class="message-content"></div>
        </div>
    </template>

    <template id="assistant-message-template">
        <div class="message assistant-message">
            <div class="message-content"></div>
        </div>
    </template>

        {#        </T E M P L A T E U R I>          #}

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}?v=1.1"></script>

</body>
</html>
